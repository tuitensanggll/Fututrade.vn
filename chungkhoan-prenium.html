<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ống Kính — Crypto Terminal</title>
<script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d13; --surface:#10141c; --surface-alt:#161b26; --border:#212836;
    --text:#e7eaf0; --text-dim:#7c8598; --accent:#3d8bff; --accent-dim:#3d8bff26;
    --up:#14cc8a; --up-dim:#14cc8a1f; --down:#ff4757; --down-dim:#ff47571f;
    --gold:#ffc93c; --gold-dim:#ffc93c22;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:radial-gradient(1100px 480px at 12% -8%, #12213a55, transparent 60%), radial-gradient(900px 420px at 100% 0%, #1a0f2a4d, transparent 55%), var(--bg); color:var(--text); font-family:'Inter', sans-serif; min-height:100vh; padding:24px; }
  .num{ font-family:'JetBrains Mono', monospace; font-variant-numeric:tabular-nums; }

  /* TOP BAR */
  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; padding-bottom:18px; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{ width:34px; height:34px; border-radius:9px; background:linear-gradient(145deg, var(--accent), #7c5cff); display:flex; align-items:center; justify-content:center; font-family:'Sora', sans-serif; font-weight:800; font-size:15px; color:#fff; box-shadow:0 4px 18px -4px #3d8bff70; }
  .brand-text{ font-family:'Sora', sans-serif; font-weight:700; font-size:16px; letter-spacing:0.2px; }
  .brand-text span{ color:var(--text-dim); font-weight:500; font-size:12px; display:block; margin-top:1px; letter-spacing:0.4px;}
  .search-box{ display:flex; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:2px; transition:border-color .15s; }
  .search-box:focus-within{ border-color:var(--accent); }
  .search-box input{ background:transparent; border:none; color:var(--text); padding:9px 4px 9px 12px; font-size:13.5px; outline:none; width:130px; text-transform:uppercase; font-family:'JetBrains Mono', monospace; letter-spacing:0.5px; }
  .search-box button{ background:var(--accent); color:#fff; border:none; padding:9px 16px; border-radius:6px; cursor:pointer; font-weight:600; font-size:13px; transition:background .15s; }
  .search-box button:hover{ background:#2f78ee; }
  .chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .chip{ background:var(--surface); border:1px solid var(--border); color:var(--text-dim); padding:7px 12px; border-radius:20px; font-size:12.5px; font-weight:600; cursor:pointer; transition:all .15s; font-family:'JetBrains Mono', monospace; }
  .chip.active{ background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }

  /* TICKER */
  .ticker-card{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px; }
  .symbol-block{ display:flex; align-items:center; gap:16px; }
  .symbol-name{ font-family:'Sora', sans-serif; font-weight:700; font-size:20px; }
  .symbol-name .quote{ color:var(--text-dim); font-weight:500; font-size:13px; margin-left:6px; }
  .live-pill{ display:flex; align-items:center; gap:6px; background:var(--up-dim); border:1px solid #14cc8a40; padding:4px 10px; border-radius:20px; font-size:10.5px; font-weight:700; color:var(--up); letter-spacing:0.6px; }
  .live-dot{ width:6px; height:6px; border-radius:50%; background:var(--up); animation:pulse 1.6s infinite; }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 #14cc8a80; } 70%{ box-shadow:0 0 0 6px #14cc8a00; } 100%{ box-shadow:0 0 0 0 #14cc8a00; } }
  .price-block{ display:flex; align-items:baseline; gap:12px; }
  .price-main{ font-size:30px; font-weight:700; }
  .price-main.up{ color:var(--up); } .price-main.down{ color:var(--down); }
  .change-badge{ font-size:13px; font-weight:700; padding:4px 9px; border-radius:6px; }
  .change-badge.up{ color:var(--up); background:var(--up-dim); } .change-badge.down{ color:var(--down); background:var(--down-dim); }
  .stats-row{ display:flex; gap:28px; flex-wrap:wrap; }
  .stat{ display:flex; flex-direction:column; gap:3px; }
  .stat-label{ font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.6px; font-weight:600;}
  .stat-value{ font-size:13.5px; font-weight:600; }
  .stat-value.up{ color:var(--up); } .stat-value.down{ color:var(--down); }

  /* TREND PANEL */
  .trend-panel{ margin-top:14px; display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; }
  .trend-card{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; position:relative; overflow:hidden; }
  .trend-card::before{ content:''; position:absolute; top:0; left:0; width:3px; height:100%; background:var(--text-dim); }
  .trend-card.up::before{ background:var(--up); } .trend-card.down::before{ background:var(--down); } .trend-card.side::before{ background:var(--gold); }
  .trend-head{ display:flex; align-items:center; justify-content:space-between; }
  .trend-name{ font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.6px; }
  .trend-basis{ font-size:10px; color:#4d5568; font-family:'JetBrains Mono', monospace; margin-top:2px; }
  .trend-badge{ display:flex; align-items:center; gap:8px; margin-top:12px; }
  .trend-arrow{ font-size:20px; line-height:1; }
  .trend-label{ font-family:'Sora', sans-serif; font-weight:700; font-size:17px; }
  .trend-card.up .trend-arrow, .trend-card.up .trend-label{ color:var(--up); }
  .trend-card.down .trend-arrow, .trend-card.down .trend-label{ color:var(--down); }
  .trend-card.side .trend-arrow, .trend-card.side .trend-label{ color:var(--gold); }
  .trend-desc{ font-size:12px; color:var(--text-dim); margin-top:9px; line-height:1.5; }
  .trend-confirm{ display:inline-block; margin-top:9px; font-size:10px; font-weight:600; padding:3px 8px; border-radius:5px; letter-spacing:0.3px; }
  .trend-confirm.agree{ background:var(--up-dim); color:var(--up); }

  /* TIMEFRAMES + CONTROLS */
  .tf-row{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-top:16px; border-bottom:1px solid var(--border); }
  .tf-tabs{ display:flex; align-items:center; gap:2px; }
  .tf-btn{ background:transparent; color:var(--text-dim); border:none; padding:10px 16px; cursor:pointer; font-weight:600; font-size:13px; border-bottom:2px solid transparent; margin-bottom:-1px; font-family:'JetBrains Mono', monospace; transition:color .15s; }
  .tf-btn.active{ color:var(--accent); border-bottom-color:var(--accent); }
  
  .controls-right { display:flex; align-items:center; gap:16px; }
  .color-pickers { display: flex; align-items: center; gap: 8px; }
  .color-pickers input[type="color"] { -webkit-appearance: none; border: none; width: 22px; height: 22px; border-radius: 4px; cursor: pointer; padding: 0; background: transparent; }
  .color-pickers input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  .color-pickers input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 4px; }
  
  .ai-toggle{ display:flex; align-items:center; gap:9px; padding:8px 4px 10px 4px; }
  .ai-toggle-label{ font-size:12.5px; font-weight:600; color:var(--text-dim); display:flex; align-items:center; gap:6px; }
  .ai-switch{ width:38px; height:21px; border-radius:20px; background:#242b3a; border:1px solid var(--border); position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
  .ai-switch.on{ background:linear-gradient(90deg, #3d8bff, #7c5cff); border-color:transparent; }
  .ai-switch::after{ content:''; position:absolute; top:2px; left:2px; width:15px; height:15px; border-radius:50%; background:#fff; transition:left .2s; }
  .ai-switch.on::after{ left:19px; }

  /* ============ MAIN CONTAINER & TOOLBAR ============ */
  .main-container {
    display: flex;
    gap: 14px;
    margin-top: 14px;
  }
  .drawing-toolbar {
    width: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 12px;
    flex-shrink: 0;
  }
  .tool-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .tool-btn:hover { background: var(--surface-alt); color: var(--text); }
  .tool-btn.active { background: var(--accent-dim); color: var(--accent); }
  .tool-btn svg { width: 20px; height: 20px; fill: currentColor; }
  .toolbar-divider { width: 24px; height: 1px; background: var(--border); margin: 4px 0; }

  /* CHART & RESIZER */
  .chart-wrapper{ display:flex; flex-direction:column; flex: 1; min-width: 0; border:1px solid var(--border); border-radius:12px; overflow:hidden; background:var(--surface); position:relative; }
  #chart-price{ width:100%; height:440px; min-height:100px; }
  #chart-volume{ width:100%; height:150px; min-height:60px; }
  .resizer{ width:100%; height:8px; background:var(--surface-alt); border-top:1px solid var(--border); border-bottom:1px solid var(--border); cursor:row-resize; position:relative; z-index:10; }
  .resizer:hover{ background:#2b3346; }
  .resizer::after{ content:''; position:absolute; top:3px; left:50%; transform:translateX(-50%); width:40px; height:2px; background:var(--text-dim); border-radius:2px; }

  /* PANELS (AI & WHALE) */
  .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
  @media (max-width: 820px) { .panel-grid { grid-template-columns: 1fr; } .main-container { flex-direction: column; } .drawing-toolbar { flex-direction: row; width: 100%; height: 48px; padding: 0 12px; justify-content: center; } .toolbar-divider { width: 1px; height: 24px; margin: 0 4px; } }
  
  .ai-panel{ background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; display: flex; flex-direction: column; max-height: 350px;}
  .ai-panel-head{ display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); }
  .ai-panel-title{ display:flex; align-items:center; gap:8px; font-family:'Sora', sans-serif; font-weight:700; font-size:14px; }
  .ai-panel-title .dot{ width:7px; height:7px; border-radius:50%; box-shadow:0 0 8px 1px #3d8bff90; }
  .btn-delete { background:transparent; border:1px solid var(--border); color:var(--text-dim); padding:4px 10px; border-radius:6px; cursor:pointer; font-size:11.5px; transition: 0.2s; }
  .btn-delete:hover { background: var(--down-dim); color: var(--down); border-color: var(--down); }
  .ai-signal-list{ overflow-y:auto; flex: 1; }
  .ai-empty{ padding:28px 18px; text-align:center; color:var(--text-dim); font-size:13px; }
  .signal-row{ display:flex; align-items:flex-start; gap:12px; padding:12px 18px; border-bottom:1px solid #1a2029; }
  .signal-badge{ flex-shrink:0; font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:6px; font-family:'JetBrains Mono', monospace; margin-top:1px; }
  .signal-badge.warn{ background:var(--gold-dim); color:var(--gold); } .signal-badge.up{ background:var(--up-dim); color:var(--up); } .signal-badge.down{ background:var(--down-dim); color:var(--down); }
  .signal-meta{ display:flex; gap:10px; align-items:baseline; }
  .signal-time{ font-size:11px; color:var(--text-dim); font-family:'JetBrains Mono', monospace; }
  .signal-price{ font-size:12px; font-weight:600; font-family:'JetBrains Mono', monospace; }
  .signal-desc{ font-size:12.5px; color:var(--text-dim); margin-top:3px; line-height:1.45; }
  
  /* WHALE ALERT TOAST */
  .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column-reverse; gap: 12px; z-index: 9999; pointer-events: none; }
  .whale-toast { background: var(--surface-alt); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 10px; padding: 14px 18px; color: var(--text); box-shadow: 0 12px 32px rgba(0,0,0,0.6); display: flex; align-items: center; gap: 14px; min-width: 280px; transform: translateX(120%); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .whale-toast.show { transform: translateX(0); opacity: 1; }
  .whale-toast.buy { border-left-color: var(--up); } .whale-toast.sell { border-left-color: var(--down); }
  .whale-icon { font-size: 24px; animation: bounce 2s infinite; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  .whale-content { display: flex; flex-direction: column; }
  .whale-title { font-size: 12px; font-weight: 800; font-family: 'Sora', sans-serif; text-transform: uppercase; letter-spacing: 0.5px;}
  .whale-toast.buy .whale-title { color: var(--up); } .whale-toast.sell .whale-title { color: var(--down); }
  .whale-desc { font-size: 13.5px; font-family: 'JetBrains Mono', monospace; margin-top: 4px; font-weight: 600; color: #fff;}
  .whale-time { font-size: 11px; color: var(--text-dim); margin-top: 5px; font-family: 'Inter', sans-serif;}

</style>
</head>
<body>

  <div class="topbar">
    <div class="brand"><div class="brand-mark">OK</div><div class="brand-text">Ống Kính<span>CRYPTO TERMINAL</span></div></div>
    <div class="chips" id="chip-container">
      <button class="chip active" data-symbol="BTC">BTC</button>
      <button class="chip" data-symbol="ETH">ETH</button>
      <button class="chip" data-symbol="SOL">SOL</button>
      <button class="chip" data-symbol="BNB">BNB</button>
      <button class="chip" data-symbol="XRP">XRP</button>
    </div>
    <div class="search-box">
      <input type="text" id="symbol-input" placeholder="Nhập mã..." value="BTC">
      <button id="search-btn">Tìm kiếm</button>
    </div>
  </div>

  <div class="ticker-card">
    <div class="symbol-block">
      <div>
        <div class="symbol-name" id="chart-title">BTCUSDT <span class="quote">4h</span></div>
        <div style="margin-top:8px;" class="live-pill"><span class="live-dot"></span>LIVE</div>
      </div>
    </div>
    <div class="price-block">
      <div class="price-main num" id="current-price">--</div>
      <div class="change-badge num" id="change-badge">--</div>
    </div>
    <div class="stats-row">
      <div class="stat"><span class="stat-label">Cao 24h</span><span class="stat-value num" id="stat-high">--</span></div>
      <div class="stat"><span class="stat-label">Thấp 24h</span><span class="stat-value num" id="stat-low">--</span></div>
      <div class="stat"><span class="stat-label">KL 24h</span><span class="stat-value num" id="stat-vol">--</span></div>
    </div>
  </div>

  <div class="trend-panel" id="trend-panel">
    <div class="trend-card" id="trend-short"><div class="trend-head"><div><div class="trend-name">Ngắn hạn</div><div class="trend-basis">EMA 9 / 21</div></div></div><div class="trend-badge"><span class="trend-arrow">—</span><span class="trend-label">Đang tính...</span></div><div class="trend-desc"></div></div>
    <div class="trend-card" id="trend-medium"><div class="trend-head"><div><div class="trend-name">Trung hạn</div><div class="trend-basis">EMA 21 / 50</div></div></div><div class="trend-badge"><span class="trend-arrow">—</span><span class="trend-label">Đang tính...</span></div><div class="trend-desc"></div></div>
    <div class="trend-card" id="trend-long"><div class="trend-head"><div><div class="trend-name">Dài hạn</div><div class="trend-basis">EMA 50 / 200</div></div></div><div class="trend-badge"><span class="trend-arrow">—</span><span class="trend-label">Đang tính...</span></div><div class="trend-desc"></div></div>
  </div>

  <div class="tf-row">
    <div class="tf-tabs" id="tf-container">
      <button class="tf-btn" data-interval="5m">5m</button>
      <button class="tf-btn" data-interval="15m">15m</button>
      <button class="tf-btn" data-interval="1h">1h</button>
      <button class="tf-btn active" data-interval="4h">4h</button>
      <button class="tf-btn" data-interval="1d">1d</button>
    </div>
    <div class="controls-right">
      <div class="color-pickers">
        <span class="ai-toggle-label">Màu:</span>
        <input type="color" id="color-up" value="#14cc8a" title="Màu nến tăng">
        <input type="color" id="color-down" value="#ff4757" title="Màu nến giảm">
        <button id="btn-screenshot" style="margin-left:6px; background:var(--surface-alt); border:1px solid var(--border); color:var(--text); padding:5px 10px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600;">📸 Chụp</button>
      </div>
      <div class="ai-toggle">
        <span class="ai-toggle-label">🤖 AI Tín hiệu</span>
        <div class="ai-switch on" id="ai-switch"></div>
      </div>
    </div>
  </div>

  <div class="main-container">
    
    <div class="drawing-toolbar" id="drawing-toolbar">
      <button class="tool-btn active" data-tool="cursor" title="Con trỏ">
        <svg viewBox="0 0 24 24"><path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2.9-3.2-7.4-4.4 4.7z"/></svg>
      </button>
      <div class="toolbar-divider"></div>
      <button class="tool-btn" data-tool="trendline" title="Đường xu hướng (Giới hạn gốc thư viện)">
        <svg viewBox="0 0 24 24"><path d="M17 3a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0 1a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm-10 12a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0 1a1 1 0 1 0 0 2 1 1 0 0 0 0-2zm9.7-10.3l-8.4 8.6-.7-.7 8.4-8.6.7.7z"/></svg>
      </button>
      <button class="tool-btn" data-tool="hline" title="Kẻ đường ngang">
        <svg viewBox="0 0 24 24"><path d="M4 11h16v2H4z"/></svg>
      </button>
      <div class="toolbar-divider"></div>
      <button class="tool-btn" id="clear-drawings" title="Xóa tất cả đường kẻ">
        <svg viewBox="0 0 24 24"><path d="M15 4V3H9v1H4v2h1v13c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V6h1V4h-5zm-1 0h-4V4h4v0zm3 15H7V6h10v13z"/></svg>
      </button>
    </div>

    <div class="chart-wrapper" id="chart-wrapper">
      <div id="chart-price" style="position: relative;"></div>
      <div class="resizer" id="pane-resizer"></div>
      <div id="chart-volume"></div>
    </div>
  </div>

  <div class="panel-grid">
    <div class="ai-panel">
      <div class="ai-panel-head"><div class="ai-panel-title"><span class="dot" style="background:var(--accent);"></span>Nhật ký AI & Volume</div></div>
      <div class="ai-signal-list" id="ai-signal-list"><div class="ai-empty" id="ai-empty">Đang phân tích...</div></div>
    </div>
    
    <div class="ai-panel">
      <div class="ai-panel-head">
        <div class="ai-panel-title"><span class="dot" style="background:var(--gold);"></span>Nhật ký Lệnh Cá Mập</div>
        <button class="btn-delete" id="btn-clear-whale">🗑️ Xóa</button>
      </div>
      <div class="ai-signal-list" id="whale-log-list"><div class="ai-empty">Chưa có dữ liệu cá mập...</div></div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

<script>
  // 1. LOCAL STORAGE & GLOBAL VARS
  let currentSymbol = localStorage.getItem('ok_symbol') || 'BTCUSDT';
  let currentInterval = localStorage.getItem('ok_interval') || '4h';
  let aiEnabled = localStorage.getItem('ok_ai') !== 'false';
  let currentUpColor = localStorage.getItem('ok_upColor') || '#14cc8a';
  let currentDownColor = localStorage.getItem('ok_downColor') || '#ff4757';
  
  let whaleLogs = JSON.parse(localStorage.getItem('ok_whale_logs') || '[]');

  let candlesData = []; let volumesData = [];
  let candlesDataMap = new Map(); let volumesDataMap = new Map();
  let signalsMap = new Map(); 
  let currentWebSocket = null; let currentTickerWS = null; let whaleWS = null;
  
  function getWhaleThreshold(symbol) {
    const s = symbol.toUpperCase();
    if (s.includes('BTC') || s.includes('ETH')) return 500000;
    const midCaps = ['SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'ADAUSDT', 'DOGEUSDT', 'AVAXUSDT', 'LINKUSDT', 'DOTUSDT', 'MATICUSDT', 'LTCUSDT'];
    if (midCaps.includes(s)) return 100000;
    return 30000;
  }

  // INIT UI
  document.getElementById('symbol-input').value = currentSymbol.replace('USDT', '');
  document.getElementById('color-up').value = currentUpColor;
  document.getElementById('color-down').value = currentDownColor;
  if (!aiEnabled) document.getElementById('ai-switch').classList.remove('on');
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.getAttribute('data-symbol') === currentSymbol.replace('USDT', '')));
  document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-interval') === currentInterval));

  function updateCSSVariables(upHex, downHex) {
    document.documentElement.style.setProperty('--up', upHex); document.documentElement.style.setProperty('--down', downHex);

  // TREND ANALYSIS LOGIC
  function computeEMA(values, period){
    const k = 2 / (period + 1); const out = new Array(values.length); out[0] = values[0];
    for (let i = 1; i < values.length; i++) out[i] = values[i] * k + out[i - 1] * (1 - k);
    return out;
  }
  function emaSlopeSignal(emaArr, lookback){
    const n = emaArr.length; if (n <= lookback) return 0;
    const diff = (emaArr[n - 1] - emaArr[n - 1 - lookback]) / emaArr[n - 1 - lookback];
    if (diff > 0.001) return 1; if (diff < -0.001) return -1; return 0;
  }
  function findSwings(candles, left, right){
    const highs = [], lows = [];
    for (let i = left; i < candles.length - right; i++){
      let isHigh = true, isLow = true;
      for (let j = i - left; j <= i + right; j++){
        if (j === i) continue;
        if (candles[j].high >= candles[i].high) isHigh = false;
        if (candles[j].low <= candles[i].low) isLow = false;
      }
      if (isHigh) highs.push(candles[i].high); if (isLow) lows.push(candles[i].low);
    }
    return { highs, lows };
  }
  function structureSignal(candles, windowSize, left, right){
    const slice = candles.slice(Math.max(0, candles.length - windowSize));
    if (slice.length < left + right + 4) return 0;
    const { highs, lows } = findSwings(slice, left, right);
    if (highs.length < 2 || lows.length < 2) return 0;
    const hh = highs[highs.length - 1] > highs[highs.length - 2]; const hl = lows[lows.length - 1] > lows[lows.length - 2];
    const lh = highs[highs.length - 1] < highs[highs.length - 2]; const ll = lows[lows.length - 1] < lows[lows.length - 2];
    if (hh && hl) return 1; if (lh && ll) return -1; return 0;
  }
  function computeHorizonTrend(candles, fastP, slowP, slopeLookback, structWindow, fracL, fracR){
    if (candles.length < slowP + 5) return { trend: 0, emaSig: 0, structSig: 0, insufficient: true };
    const closes = candles.map(c => c.close);
    const emaFast = computeEMA(closes, fastP); const emaSlow = computeEMA(closes, slowP);
    const lastClose = closes[closes.length - 1]; const lastFast = emaFast[emaFast.length - 1]; const lastSlow = emaSlow[emaSlow.length - 1];
    const slope = emaSlopeSignal(emaFast, slopeLookback);
    let emaSig = 0;
    if (lastFast > lastSlow && lastClose > lastFast && slope >= 0) emaSig = 1;
    else if (lastFast < lastSlow && lastClose < lastFast && slope <= 0) emaSig = -1;
    const structSig = structureSignal(candles, structWindow, fracL, fracR);
    let trend = 0;
    if (emaSig === 1 && structSig === 1) trend = 1; else if (emaSig === -1 && structSig === -1) trend = -1;
    else if (emaSig !== 0 && structSig === 0) trend = emaSig * 0.5; else trend = 0;
    return { trend, emaSig, structSig, insufficient: false };
  }
  function renderTrendCard(elId, result, horizonName){
    const card = document.getElementById(elId); card.className = "trend-card"; 
    if (result.insufficient){
      card.classList.add('side'); card.querySelector('.trend-arrow').innerText = '—';

    }
    const agree = result.emaSig !== 0 && result.emaSig === result.structSig;
    let cls, arrow, label, reason;
    if (result.trend === 1){ cls = 'up'; arrow = '▲'; label = 'TĂNG'; reason = agree ? `Đồng thuận cấu trúc & EMA.` : `Chỉ EMA tăng.`; } 
    else if (result.trend === -1){ cls = 'down'; arrow = '▼'; label = 'GIẢM'; reason = agree ? `Đồng thuận cấu trúc & EMA.` : `Chỉ EMA giảm.`; } 
    else if (result.trend > 0 && result.trend < 1){ cls = 'up'; arrow = '▲'; label = 'TĂNG NHẸ'; reason = 'EMA nghiêng tăng, cấu trúc chưa rõ.'; } 
    else if (result.trend < 0 && result.trend > -1){ cls = 'down'; arrow = '▼'; label = 'GIẢM NHẸ'; reason = 'EMA nghiêng giảm, cấu trúc chưa rõ.'; } 
    else { cls = 'side'; arrow = '↔'; label = 'ĐI NGANG'; reason = 'Tín hiệu giằng co, chưa rõ ràng.'; }
    card.classList.add(cls); card.querySelector('.trend-arrow').innerText = arrow; card.querySelector('.trend-label').innerText = label;
    card.querySelector('.trend-desc').innerHTML = reason + (agree ? '<span class="trend-confirm agree">Đồng thuận</span>' : '');
  }

    renderTrendCard('trend-short', computeHorizonTrend(candlesData, 9, 21, 5, 40, 2, 2), 'Ngắn hạn');

  // AI LOGIC
  const VOL_LOOKBACK = 20; const ACC_LOOKBACK = 10; const VOL_SPIKE_MULT = 2.5; const STRONG_MOVE_PCT = 0.012; const ACC_RANGE_PCT = 0.03;
  function runAIAnalysis(){
    runTrendAnalysis();
    signalsMap.clear();

    const aiList = document.getElementById('ai-signal-list');
    if(!aiEnabled){ candleSeries.setMarkers([]); aiList.innerHTML='<div class="ai-empty">AI Đang tắt. Bật công tắc để phân tích.</div>'; return;}
    
    const signals = [];
    for (let i = VOL_LOOKBACK; i < candlesData.length; i++){
      const c = candlesData[i]; const v = volumesData[i].value;
      let sumVol = 0; for (let j = i - VOL_LOOKBACK; j < i; j++) sumVol += volumesData[j].value;
      const avgVol = sumVol / VOL_LOOKBACK; if (avgVol <= 0) continue;
      const volRatio = v / avgVol; const body = Math.abs(c.close - c.open); const bodyPct = body / c.open;
      if (volRatio < VOL_SPIKE_MULT || bodyPct < STRONG_MOVE_PCT) continue;
      const range = (c.high - c.low) || 1e-9; const upperWick = c.high - Math.max(c.open, c.close); const lowerWick = Math.min(c.open, c.close) - c.low;
      const isBullish = c.close > c.open;
      const accStart = Math.max(0, i - ACC_LOOKBACK); const accCandles = candlesData.slice(accStart, i);
      let accHigh = -Infinity, accLow = Infinity;
      accCandles.forEach(ac => { accHigh = Math.max(accHigh, ac.high); accLow = Math.min(accLow, ac.low); });
      const accRangePct = accCandles.length ? (accHigh - accLow) / accLow : Infinity;
      const isAccumulation = accCandles.length >= 6 && accRangePct <= ACC_RANGE_PCT;
      const rejectionWick = isBullish ? upperWick / range : lowerWick / range;
      const isClimax = isAccumulation && rejectionWick >= 0.22;
      
      let type, label, tone, desc, colorMarker;
      if (isBullish){
        if (isClimax){ type = 'buying_climax'; label = 'Buying Climax'; tone = 'warn'; desc = 'Volume bùng nổ sau tích lũy... cẩn thận đảo chiều.'; colorMarker = currentUpColor; } 
        else { type = 'vol_spike_up'; label = 'Volume tăng — giá tăng'; tone = 'up'; desc = 'Dòng tiền đổ vào đột biến...'; colorMarker = currentUpColor; }
      } else {
        if (isClimax){ type = 'selling_climax'; label = 'Selling Climax'; tone = 'warn'; desc = 'Volume bùng nổ sau tích lũy... dấu hiệu cạn cung.'; colorMarker = currentDownColor; } 
        else { type = 'vol_spike_down'; label = 'Volume tăng — giá giảm'; tone = 'down'; desc = 'Dòng tiền thoát ra đột biến...'; colorMarker = currentDownColor; }
      }
      
      const sigObj = { time: c.time, type, label, tone, desc, price: c.close, volRatio, bodyPct: bodyPct * 100, color: colorMarker };
      signals.push(sigObj);
      signalsMap.set(c.time, sigObj);
    }
    
    const markers = signals.map(s => {
      if (s.type === 'buying_climax') return { time: s.time, position: 'aboveBar', color: s.color, shape: 'arrowDown', text: 'BC' };
      if (s.type === 'selling_climax') return { time: s.time, position: 'belowBar', color: s.color, shape: 'arrowUp', text: 'SC' };
      if (s.type === 'vol_spike_up') return { time: s.time, position: 'belowBar', color: s.color, shape: 'circle', text: '' };
      return { time: s.time, position: 'aboveBar', color: s.color, shape: 'circle', text: '' };
    }).sort((a,b) => a.time - b.time);
    candleSeries.setMarkers(markers);
    
    aiList.innerHTML = '';
    if (signals.length === 0){ aiList.innerHTML = '<div class="ai-empty">Chưa phát hiện tín hiệu bất thường...</div>'; return; }
    signals.slice(-10).reverse().forEach(s => {
      const row = document.createElement('div'); row.className = 'signal-row';
      row.innerHTML = `<div class="signal-badge ${s.tone}">${s.label}</div><div class="signal-body" style="flex:1;"><div class="signal-meta"><span class="signal-time">${fmtTime(s.time)}</span><span class="signal-price">${fmt(s.price)} USDT</span></div><div class="signal-desc">Vol x${s.volRatio.toFixed(1)} · Δ ${s.bodyPct.toFixed(2)}%</div></div>`;
      aiList.appendChild(row);
    });
  }
  
  document.getElementById('ai-switch').addEventListener('click', () => { aiEnabled = !aiEnabled; document.getElementById('ai-switch').classList.toggle('on', aiEnabled); localStorage.setItem('ok_ai', aiEnabled); runAIAnalysis(); });

  // 4. MAIN DATA LOOP
  function updateChart() {

    if (currentWebSocket) currentWebSocket.close(); if (currentTickerWS) currentTickerWS.close(); if (whaleWS) whaleWS.close();

    fetch(`https://api.binance.com/api/v3/klines?symbol=${currentSymbol}&interval=${currentInterval}&limit=1000`).then(r => r.json()).then(data => {

        const cData = { time, open, high, low, close };
        const vData = { time, value: volume, color: close >= open ? currentUpColor+'59' : currentDownColor+'59' };
        parsedCandles.push(cData); parsedVolumes.push(vData); candlesDataMap.set(time, cData); volumesDataMap.set(time, vData);
      });
      candleSeries.setData(parsedCandles); volumeSeries.setData(parsedVolumes);

      currentTickerWS = new WebSocket(`wss://stream.binance.com:9443/ws/${currentSymbol.toLowerCase()}@ticker`);

        const t = JSON.parse(e.data); const changePct = parseFloat(t.P); const isUp = changePct >= 0;
        changeBadge.innerText = (isUp ? '+' : '') + changePct.toFixed(2) + '%'; changeBadge.className = "change-badge num " + (isUp ? "up" : "down");
        document.getElementById('stat-high').innerText = fmt(parseFloat(t.h)); document.getElementById('stat-low').innerText = fmt(parseFloat(t.l)); document.getElementById('stat-vol').innerText = fmtVol(parseFloat(t.q)) + " USDT";
      };

      currentWebSocket = new WebSocket(`wss://stream.binance.com:9443/ws/${currentSymbol.toLowerCase()}@kline_${currentInterval}`);
      currentWebSocket.onmessage = function (event) {
        const kline = JSON.parse(event.data).k; const time = kline.t / 1000;
        const liveCandle = { time, open: parseFloat(kline.o), high: parseFloat(kline.h), low: parseFloat(kline.l), close: parseFloat(kline.c) };
        const isLiveUp = liveCandle.close >= liveCandle.open;
        const liveVolume = { time, value: parseFloat(kline.v), color: isLiveUp ? currentUpColor+'59' : currentDownColor+'59' };
        candleSeries.update(liveCandle); volumeSeries.update(liveVolume); priceElement.innerText = fmt(liveCandle.close) + " USDT"; priceElement.className = "price-main num " + (isLiveUp ? "up" : "down");
        candlesDataMap.set(time, liveCandle); volumesDataMap.set(time, liveVolume);
        const lastIdx = candlesData.length - 1;
        if (lastIdx >= 0 && candlesData[lastIdx].time === time){ candlesData[lastIdx] = liveCandle; volumesData[lastIdx] = liveVolume; } 
        else { candlesData.push(liveCandle); volumesData.push(liveVolume); }
        if (kline.x === true) runAIAnalysis();
      };
      
      whaleWS = new WebSocket(`wss://stream.binance.com:9443/ws/${currentSymbol.toLowerCase()}@aggTrade`);

  }

  // 5. OTHER UTILS
  document.getElementById('color-up').addEventListener('input', e => { currentUpColor = e.target.value; localStorage.setItem('ok_upColor', currentUpColor); updateCSSVariables(currentUpColor, currentDownColor); candleSeries.applyOptions({ upColor: currentUpColor, wickUpColor: currentUpColor }); updateChart(); });
  document.getElementById('color-down').addEventListener('input', e => { currentDownColor = e.target.value; localStorage.setItem('ok_downColor', currentDownColor); updateCSSVariables(currentUpColor, currentDownColor); candleSeries.applyOptions({ downColor: currentDownColor, wickDownColor: currentDownColor }); updateChart(); });
  document.getElementById('btn-screenshot').addEventListener('click', () => { const a = document.createElement('a'); a.href = chartPrice.takeScreenshot().toDataURL('image/png'); a.download = `OngKinh_${currentSymbol}.png`; a.click(); });
  
  let isResizing = false; let startY = 0; let startH1 = 0; let startH2 = 0;
  document.getElementById('pane-resizer').addEventListener('mousedown', e => { isResizing = true; startY = e.clientY; startH1 = document.getElementById('chart-price').clientHeight; startH2 = document.getElementById('chart-volume').clientHeight; document.body.style.cursor = 'row-resize'; e.preventDefault(); });
  window.addEventListener('mousemove', e => { if (!isResizing) return; const dy = e.clientY - startY; const h1 = startH1 + dy; const h2 = startH2 - dy; if (h1 > 100 && h2 > 60) { document.getElementById('chart-price').style.height = h1+'px'; document.getElementById('chart-volume').style.height = h2+'px'; chartPrice.applyOptions({ height: h1 }); chartVolume.applyOptions({ height: h2 }); } });
  window.addEventListener('mouseup', () => { if (isResizing) { isResizing = false; document.body.style.cursor = 'default'; } });

  function executeSearch(fromChip) {
    let inputVal = document.getElementById('symbol-input').value.trim().toUpperCase(); if (inputVal === "") return;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.getAttribute('data-symbol') === (fromChip ? inputVal : null)));
    if (!inputVal.endsWith('USDT')) inputVal += 'USDT'; currentSymbol = inputVal; localStorage.setItem('ok_symbol', currentSymbol); updateChart();
  }
  document.getElementById('search-btn').addEventListener('click', () => executeSearch(false));
  document.getElementById('symbol-input').addEventListener('keypress', e => { if (e.key === 'Enter') executeSearch(false); });
  document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', function(){ document.getElementById('symbol-input').value = this.getAttribute('data-symbol'); executeSearch(true); }));
  document.querySelectorAll('.tf-btn').forEach(btn => btn.addEventListener('click', function() { document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active')); this.classList.add('active'); currentInterval = this.getAttribute('data-interval'); localStorage.setItem('ok_interval', currentInterval); updateChart(); }));
  window.addEventListener('resize', () => { const cw = document.querySelector('.chart-wrapper').clientWidth; chartPrice.applyOptions({ width: cw }); chartVolume.applyOptions({ width: cw }); });

  updateChart();
</script>
</body>
</html>
